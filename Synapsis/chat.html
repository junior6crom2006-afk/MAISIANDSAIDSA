<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Synapsis Chat IA</title>
<style>
  body {font-family: Inter, Arial, sans-serif; margin:0; background: #0f172a; color:#e2e8f0; }
  .wrap { max-width: 760px; margin: 24px auto; padding: 12px; }
  .card { background: #1e293b; border-radius: 16px; box-shadow: 0 8px 24px rgba(15,23,42,.45); }
  h1{ margin:16px; color:#f8fafc; font-size:1.8rem; }
  #messages{ min-height: 360px; max-height: 62vh; overflow:auto; padding:16px; }
  .msg{ margin:8px 0; padding:10px 12px; border-radius:12px; line-height:1.4; }
  .user{ background: #334155; text-align:right; color:#e2e8f0; }
  .bot{ background: #0f172a; border:1px solid #334155; text-align:left; color:#cbd5e1; }
  form{ display:flex; gap: 8px; padding: 12px; border-top: 1px solid #334155; }
  input{ flex:1; border:0; border-radius:999px; padding:12px; background:#0f172a; color:#e2e8f0; border:1px solid #334155; }
  button{ border:none; border-radius:999px; background:#2563eb; color:white; padding:12px 16px; cursor:pointer; }
  button:disabled{ background:#94a3b8; }
  .small{ margin:4px 12px; color:#94a3b8; }
</style>
</head>
<body>
<div class="wrap card">
  <h1>Synapsis Chat IA (Ollama)</h1>
  <div id="messages"></div>
  <div class="small" id="status"></div>
  <form id="chat-form">
    <input type="text" id="message" placeholder="Escribe tu mensaje..." autocomplete="off" required />
    <button type="submit">Enviar</button>
  </form>
</div>
<script>
const messagesEl = document.getElementById('messages');
const statusEl = document.getElementById('status');
const form = document.getElementById('chat-form');
const messageInput = document.getElementById('message');
let session = localStorage.getItem('synapsis_session') || '';

function append(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  div.textContent = (role === 'user' ? 'Yo: ' : 'IA: ') + text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setStatus(text){ statusEl.textContent = text; }

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = messageInput.value.trim();
  if (!text) return;
  append('user', text);
  messageInput.value='';
  setStatus('Escribiendo...');
  form.querySelector('button').disabled = true;

  try {
    const payload = { session, message: text };
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      append('bot', 'Error: ' + (data.error || res.statusText));
      setStatus('Error de comunicación');
    } else {
      session = data.session;
      localStorage.setItem('synapsis_session', session);
      append('bot', data.response);
      setStatus('Listo.');
    }
  } catch(e) {
    append('bot', 'Error de red: ' + e.message);
    setStatus('Error');
  } finally { form.querySelector('button').disabled = false; }
});
</script>
</body>
</html>
