<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="0; url=/chat" />
<title>Synapsis Chat - Redirigiendo...</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #0f172a; color: #e2e8f0; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { color: #2563eb; }
  p { margin: 20px 0; }
  .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #334155; border-radius: 50%; border-top-color: #2563eb; animation: spin 1s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>🧠 Synapsis Chat IA</h1>
  <p><span class="loading"></span> Redirigiendo al chat...</p>
  <p>Si no se redirige automáticamente, <a href="/chat" style="color: #2563eb;">haz clic aquí</a>.</p>
  <hr style="border-color: #334155;">
  <p><small>Servicio de chat conversacional con IA local y fallback a OpenAI.</small></p>
</div>
</body>
</html>
